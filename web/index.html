<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 Travel Claw - 旅行龙虾</title>
<style>
/* ═══════════════════════════════════════════════
   PIXEL FONT & RESET
   ═══════════════════════════════════════════════ */
@font-face {
  font-family: 'PixelFont';
  src: url('data:font/woff2;base64,') format('woff2');
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { 
  font-size: 16px;
  image-rendering: pixelated;
  -ms-interpolation-mode: nearest-neighbor;
}
body {
  font-family: 'Courier New', 'Consolas', monospace;
  background: #1a1a2e;
  color: #e0d5c0;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ═══════════════════════════════════════════════
   PIXEL BORDERS & UTILITIES
   ═══════════════════════════════════════════════ */
.pixel-border {
  border: 4px solid #5a4a3a;
  box-shadow:
    inset -4px -4px 0 #3a2a1a,
    inset 4px 4px 0 #7a6a5a,
    0 0 0 2px #2a1a0a;
  background: #2a1f14;
}
.pixel-border-light {
  border: 3px solid #8a7a5a;
  box-shadow:
    inset -3px -3px 0 #5a4a3a,
    inset 3px 3px 0 #b0a080;
  background: #3a2f1f;
}
.pixel-inset {
  border: 3px solid #1a1008;
  box-shadow:
    inset 3px 3px 0 #1a1008,
    inset -3px -3px 0 #5a4a3a;
  background: #1f1a10;
}

/* ═══════════════════════════════════════════════
   LOADING / BOOT SCREEN
   ═══════════════════════════════════════════════ */
#boot-screen {
  position: fixed; inset: 0;
  background: #0a0a12;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s;
}
#boot-screen.hide { opacity: 0; pointer-events: none; }
.boot-logo {
  font-size: 4rem;
  animation: bootBounce 1s infinite;
}
@keyframes bootBounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.boot-text {
  margin-top: 1rem;
  font-size: 1.2rem;
  color: #8a7a5a;
  animation: blink 1s step-end infinite;
}
.boot-bar {
  width: 200px; height: 12px;
  margin-top: 1.5rem;
  background: #1a1a2e;
  border: 2px solid #5a4a3a;
}
.boot-bar-fill {
  height: 100%; width: 0%;
  background: #e8a832;
  transition: width 0.3s;
}
@keyframes blink { 50% { opacity: 0; } }

/* ═══════════════════════════════════════════════
   ANIMATED STARFIELD BACKGROUND
   ═══════════════════════════════════════════════ */
#stars-canvas {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════
   MAIN LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  opacity: 0;
  transition: opacity 0.5s;
  display: flex; flex-direction: column;
  min-height: 100vh;
}
#app.show { opacity: 1; }

/* ─── Top Bar ─── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: linear-gradient(180deg, #3a2a1a 0%, #2a1f14 100%);
  border-bottom: 4px solid #5a4a3a;
  box-shadow: 0 4px 0 #1a0a00;
  position: sticky; top: 0; z-index: 100;
}
.top-bar-left {
  display: flex; align-items: center; gap: 12px;
}
.game-title {
  font-size: 1.4rem;
  color: #e8a832;
  text-shadow: 2px 2px 0 #5a3a00;
  letter-spacing: 2px;
}
.game-title span { font-size: 1.6rem; }
.weather-badge {
  padding: 4px 10px;
  border-radius: 0;
  font-size: 0.85rem;
  background: #1a1a2e;
  border: 2px solid #5a4a3a;
  color: #b0d0f0;
}
.top-bar-right {
  display: flex; gap: 8px; align-items: center;
}
.server-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.8rem; color: #8a7a5a;
}
.status-dot {
  width: 8px; height: 8px;
  background: #555;
  display: inline-block;
}
.status-dot.online { background: #4a4; }
.status-dot.offline { background: #a44; }
.select-pixel {
  background: #2a1f14;
  color: #e0d5c0;
  border: 2px solid #5a4a3a;
  padding: 4px 8px;
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
}

/* ─── Main Grid ─── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  gap: 8px;
  padding: 8px;
  flex: 1;
}

/* ═══════════════════════════════════════════════
   WORLD MAP (Pixel Art Canvas)
   ═══════════════════════════════════════════════ */
.map-panel {
  grid-column: 1;
  grid-row: 1 / 3;
  position: relative;
  overflow: hidden;
  min-height: 500px;
}
#world-map {
  width: 100%;
  height: 100%;
  cursor: crosshair;
  display: block;
}
.map-legend {
  position: absolute;
  bottom: 8px; left: 8px;
  padding: 6px 10px;
  background: rgba(26,26,46, 0.9);
  border: 2px solid #5a4a3a;
  font-size: 0.75rem;
  display: flex; gap: 12px;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot {
  width: 8px; height: 8px;
  display: inline-block;
}
.map-tooltip {
  position: absolute;
  padding: 6px 10px;
  background: #2a1f14;
  border: 2px solid #e8a832;
  font-size: 0.8rem;
  pointer-events: none;
  display: none;
  z-index: 10;
  max-width: 200px;
  white-space: nowrap;
}

/* ─── Right Sidebar ─── */
.sidebar {
  grid-column: 2;
  grid-row: 1 / 3;
  display: flex; flex-direction: column; gap: 8px;
  max-height: calc(100vh - 56px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #5a4a3a #1a1a2e;
}

/* ═══════════════════════════════════════════════
   CHARACTER STATUS CARD (Pixel RPG Style)
   ═══════════════════════════════════════════════ */
.char-card {
  padding: 12px;
}
.char-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.char-sprite {
  width: 48px; height: 48px;
  position: relative;
}
.lobster-pixel {
  /* CSS pixel art lobster */
  width: 48px; height: 48px;
  background: transparent;
  image-rendering: pixelated;
  position: relative;
  animation: lobsterIdle 1.5s steps(1) infinite;
}
@keyframes lobsterIdle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
.char-name {
  font-size: 1.1rem;
  color: #e8a832;
  text-shadow: 1px 1px 0 #5a3a00;
}
.char-location {
  font-size: 0.75rem;
  color: #8a7a5a;
  margin-top: 2px;
}
.char-location::before { content: '📍 '; }

/* Stat Bars */
.stat-bars { display: flex; flex-direction: column; gap: 6px; }
.stat-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.8rem;
}
.stat-icon { width: 16px; text-align: center; }
.stat-label { width: 48px; color: #8a7a5a; }
.stat-bar-bg {
  flex: 1; height: 10px;
  background: #1a1008;
  border: 1px solid #3a2a1a;
  position: relative;
}
.stat-bar-fill {
  height: 100%;
  transition: width 0.4s;
}
.stat-bar-fill.health { background: linear-gradient(90deg, #a33, #e55); }
.stat-bar-fill.mood { background: linear-gradient(90deg, #a83, #ec5); }
.stat-bar-fill.fatigue { background: linear-gradient(90deg, #558, #88c); }
.stat-bar-fill.hunger { background: linear-gradient(90deg, #853, #c85); }
.stat-value {
  position: absolute; right: 4px; top: -1px;
  font-size: 0.65rem; color: #ddd;
  text-shadow: 1px 1px 0 #000;
}
.stat-money {
  display: flex; justify-content: space-between;
  font-size: 0.85rem;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 2px dashed #3a2a1a;
}
.money-val { color: #e8a832; }
.xp-val { color: #88ccee; }

/* ═══════════════════════════════════════════════
   PANEL TITLES
   ═══════════════════════════════════════════════ */
.panel-title {
  font-size: 0.9rem;
  color: #e8a832;
  text-shadow: 1px 1px 0 #5a3a00;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 2px solid #3a2a1a;
  display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════════════
   QUEST PANEL
   ═══════════════════════════════════════════════ */
.quest-panel { padding: 10px; }
.quest-item {
  padding: 6px 8px;
  margin-bottom: 4px;
  background: #1f1a10;
  border-left: 3px solid #e8a832;
  font-size: 0.78rem;
}
.quest-item.completed { border-left-color: #4a4; opacity: 0.7; }
.quest-title { color: #e0d5c0; font-weight: bold; }
.quest-progress {
  margin-top: 3px;
  display: flex; align-items: center; gap: 6px;
}
.quest-bar-bg {
  flex: 1; height: 6px;
  background: #1a1008;
  border: 1px solid #3a2a1a;
}
.quest-bar-fill { height: 100%; background: #e8a832; }
.quest-count { font-size: 0.7rem; color: #8a7a5a; }
.no-data { font-size: 0.8rem; color: #5a4a3a; font-style: italic; padding: 8px; }

/* ═══════════════════════════════════════════════
   FRIENDS PANEL
   ═══════════════════════════════════════════════ */
.friends-panel { padding: 10px; }
.friend-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0;
  font-size: 0.8rem;
}
.friend-avatar { font-size: 1.2rem; }
.friend-info { flex: 1; }
.friend-name { color: #e0d5c0; }
.friend-level { color: #8a7a5a; font-size: 0.7rem; }
.friend-heart { color: #e55; font-size: 0.7rem; }

/* ═══════════════════════════════════════════════
   LEADERBOARD
   ═══════════════════════════════════════════════ */
.leaderboard-panel { padding: 10px; }
.lb-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 6px;
  margin-bottom: 3px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.1s;
}
.lb-row:hover { background: #3a2f1f; }
.lb-row.active { background: #3a2f1f; border-left: 3px solid #e8a832; }
.lb-rank {
  width: 22px; text-align: center;
  color: #e8a832; font-weight: bold;
}
.lb-rank.gold { color: #ffd700; }
.lb-rank.silver { color: #c0c0c0; }
.lb-rank.bronze { color: #cd7f32; }
.lb-name { flex: 1; color: #e0d5c0; }
.lb-xp { color: #88ccee; font-size: 0.75rem; }
.lb-loc { color: #8a7a5a; font-size: 0.7rem; }

/* ═══════════════════════════════════════════════
   WEATHER PANEL
   ═══════════════════════════════════════════════ */
.weather-panel {
  padding: 10px;
  text-align: center;
}
.weather-icon-big {
  font-size: 2.5rem;
  animation: weatherFloat 3s ease-in-out infinite;
}
@keyframes weatherFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
.weather-desc {
  font-size: 0.85rem;
  color: #b0d0f0;
  margin-top: 4px;
}
.weather-mods {
  display: flex; justify-content: center; gap: 12px;
  margin-top: 6px;
  font-size: 0.75rem;
}
.mod-positive { color: #5a5; }
.mod-negative { color: #a55; }

/* ═══════════════════════════════════════════════
   COLLECTIONS / ALBUM
   ═══════════════════════════════════════════════ */
.album-panel { padding: 10px; }
.album-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.album-stat {
  padding: 6px; text-align: center;
  background: #1f1a10;
  border: 1px solid #3a2a1a;
}
.album-stat-num {
  font-size: 1.2rem;
  color: #e8a832;
}
.album-stat-label {
  font-size: 0.7rem;
  color: #8a7a5a;
}
.album-completion {
  margin-top: 8px;
  text-align: center;
}
.completion-pct {
  font-size: 1.4rem;
  color: #e8a832;
}

/* ═══════════════════════════════════════════════
   TITLES / ACHIEVEMENTS
   ═══════════════════════════════════════════════ */
.titles-panel { padding: 10px; }
.title-badge {
  display: inline-block;
  padding: 3px 8px;
  margin: 2px;
  background: #1f1a10;
  border: 1px solid #5a4a3a;
  font-size: 0.75rem;
  color: #e8a832;
}

/* ═══════════════════════════════════════════════
   ACTIVITY FEED (Bottom Ticker)
   ═══════════════════════════════════════════════ */
.activity-feed {
  padding: 10px; max-height: 250px; overflow-y: auto;
}
.feed-item {
  padding: 4px 8px;
  margin-bottom: 3px;
  font-size: 0.78rem;
  border-left: 3px solid #5a4a3a;
  animation: feedSlide 0.3s;
}
@keyframes feedSlide {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: #5a4a3a; font-size: 0.65rem; }
.feed-text { color: #b0a080; }
.feed-item.event { border-left-color: #e8a832; }
.feed-item.npc { border-left-color: #88ccee; }
.feed-item.quest { border-left-color: #5a5; }
.feed-item.travel { border-left-color: #c888ee; }
.feed-item.photo { border-left-color: #e55; }

/* ═══════════════════════════════════════════════
   NOTES / MESSAGES PANEL
   ═══════════════════════════════════════════════ */
.notes-panel { padding: 10px; }
.note-item {
  padding: 6px 8px;
  margin-bottom: 4px;
  background: #1f1a10;
  border: 1px solid #3a2a1a;
  font-size: 0.78rem;
}
.note-author { color: #e8a832; font-size: 0.7rem; }
.note-content { color: #e0d5c0; margin-top: 2px; }
.note-location { color: #5a4a3a; font-size: 0.65rem; margin-top: 2px; }

/* ═══════════════════════════════════════════════
   POEMS & ART GALLERY
   ═══════════════════════════════════════════════ */
.gallery-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.gallery-item {
  padding: 8px; text-align: center;
  background: #1f1a10;
  border: 1px solid #3a2a1a;
  font-size: 0.75rem;
  cursor: pointer;
  transition: border-color 0.2s;
}
.gallery-item:hover { border-color: #e8a832; }
.gallery-emoji { font-size: 2rem; }
.poem-card {
  padding: 8px;
  margin-bottom: 4px;
  background: #1f1a10;
  border: 1px solid #3a2a1a;
  font-size: 0.78rem;
}
.poem-title { color: #e8a832; font-style: italic; }
.poem-content { color: #b0a080; margin-top: 4px; line-height: 1.3; white-space: pre-wrap; }
.poem-location { color: #5a4a3a; font-size: 0.65rem; margin-top: 4px; }

/* ═══════════════════════════════════════════════
   GARDEN PANEL
   ═══════════════════════════════════════════════ */
.garden-panel { padding: 10px; }
.garden-visual {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-bottom: 8px;
}
.clover { font-size: 0.9rem; animation: cloverSway 2s ease-in-out infinite; }
.clover:nth-child(odd) { animation-delay: 0.3s; }
@keyframes cloverSway {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(5deg); }
}
.garden-info {
  display: flex; justify-content: space-between;
  font-size: 0.8rem;
}

/* ═══════════════════════════════════════════════
   SHOP / BACKPACK
   ═══════════════════════════════════════════════ */
.inventory-panel { padding: 10px; }
.inv-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; font-size: 0.8rem;
}
.inv-qty {
  width: 20px; text-align: center;
  color: #e8a832;
}

/* ═══════════════════════════════════════════════
   NPC ENCOUNTERS
   ═══════════════════════════════════════════════ */
.npc-panel { padding: 10px; }
.npc-item {
  padding: 6px 8px;
  margin-bottom: 4px;
  background: #1f1a10;
  border-left: 3px solid #88ccee;
  font-size: 0.78rem;
}
.npc-name { color: #88ccee; font-weight: bold; }
.npc-dialogue { color: #b0a080; margin-top: 2px; font-style: italic; }
.npc-outcome { color: #8a7a5a; font-size: 0.7rem; margin-top: 2px; }

/* ═══════════════════════════════════════════════
   LOTTERY HISTORY
   ═══════════════════════════════════════════════ */
.lottery-panel { padding: 10px; }
.lottery-item {
  display: flex; justify-content: space-between;
  padding: 4px 0; font-size: 0.8rem;
  border-bottom: 1px dashed #2a1a0a;
}
.lottery-prize { color: #e8a832; }
.lottery-prize.jackpot { color: #ffd700; animation: jackpotGlow 1s ease-in-out infinite; }
@keyframes jackpotGlow {
  0%, 100% { text-shadow: 0 0 4px #ffd700; }
  50% { text-shadow: 0 0 12px #ffd700; }
}

/* ═══════════════════════════════════════════════
   TAB NAVIGATION (for sidebar sections)
   ═══════════════════════════════════════════════ */
.tab-nav {
  display: flex; flex-wrap: wrap; gap: 2px;
  margin-bottom: 8px;
}
.tab-btn {
  padding: 4px 8px;
  background: #1f1a10;
  border: 2px solid #3a2a1a;
  color: #8a7a5a;
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.1s;
}
.tab-btn:hover { background: #3a2f1f; color: #e0d5c0; }
.tab-btn.active {
  background: #3a2f1f;
  border-color: #e8a832;
  color: #e8a832;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ═══════════════════════════════════════════════
   BOTTOM BAR - ACTIVITY FEED
   ═══════════════════════════════════════════════ */
.bottom-bar {
  border-top: 4px solid #5a4a3a;
  background: linear-gradient(0deg, #2a1f14 0%, #3a2a1a 100%);
  padding: 8px;
}

/* ═══════════════════════════════════════════════
   PARTICLES & DECORATIONS
   ═══════════════════════════════════════════════ */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation: particleFall linear forwards;
}
@keyframes particleFall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* Day/Night overlay */
.daynight-overlay {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: background 2s;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #5a4a3a; }
::-webkit-scrollbar-thumb:hover { background: #7a6a5a; }

/* Travel line animation */
.travel-line {
  stroke-dasharray: 8 4;
  animation: dashMove 1s linear infinite;
}
@keyframes dashMove {
  to { stroke-dashoffset: -12; }
}

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 900px) {
  .main-grid {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
  }
  .sidebar { grid-column: 1; max-height: unset; }
  .map-panel { min-height: 300px; }
}

/* ═══════════════════════════════════════════════
   TRANSITION EFFECTS
   ═══════════════════════════════════════════════ */
.fade-in { animation: fadeIn 0.5s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<!-- Boot Screen -->
<div id="boot-screen">
  <div class="boot-logo">🦞</div>
  <div class="boot-text">Loading Travel Claw...</div>
  <div class="boot-bar"><div class="boot-bar-fill" id="boot-fill"></div></div>
</div>

<!-- Day/Night Overlay -->
<div class="daynight-overlay" id="daynight"></div>

<!-- Stars Background -->
<canvas id="stars-canvas"></canvas>

<!-- Main App -->
<div id="app">
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <div class="game-title"><span>🦞</span> Travel Claw</div>
      <div class="weather-badge" id="weather-badge">🌤️ --</div>
    </div>
    <div class="top-bar-right">
      <select class="select-pixel" id="player-select" title="选择角色">
        <option value="">-- 选择角色 --</option>
      </select>
      <div class="server-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">连接中...</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="main-grid">

// ─── Pixel Sound Effect Engine (Web Audio API) ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playPixelSound(type) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0.08;
  const now = audioCtx.currentTime;
  switch (type) {
    case 'click':
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.setValueAtTime(600, now + 0.05);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      break;
    case 'select':
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(600, now + 0.05);
      osc.frequency.setValueAtTime(800, now + 0.1);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      break;
    case 'success':
      osc.type = 'square';
      [523, 659, 784, 1047].forEach((f, i) => {
        osc.frequency.setValueAtTime(f, now + i * 0.08);
      });
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'update':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(550, now + 0.05);
      gain.gain.setValueAtTime(0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      break;
    case 'error':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.setValueAtTime(150, now + 0.1);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
    case 'ambient':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, now);
      gain.gain.setValueAtTime(0.02, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
      osc.start(now); osc.stop(now + 2);
      break;
  }
}

// ─── Starfield Background ───
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      s: Math.random() * 2 + 1,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.02,
    }));
  }
  resize();
  window.addEventListener('resize', resize);
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 1 || s.a < 0.1) s.da = -s.da;
      ctx.fillStyle = `rgba(255,255,220,${s.a * 0.5})`;
      ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.s), Math.ceil(s.s));
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ─── Day/Night Cycle ───
function updateDayNight() {
  const hour = new Date().getHours();
  const el = document.getElementById('daynight');
  if (hour >= 6 && hour < 8) {
    el.style.background = 'rgba(255,180,80,0.05)'; // dawn
  } else if (hour >= 8 && hour < 17) {
    el.style.background = 'rgba(255,255,200,0.02)'; // day
  } else if (hour >= 17 && hour < 20) {
    el.style.background = 'rgba(255,120,50,0.06)'; // sunset
  } else {
    el.style.background = 'rgba(10,10,40,0.15)'; // night
  }
}

// ─── Pixel Art: Draw Lobster Sprite ───
function drawLobsterSprite(canvas, frame = 0) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 48, 48);
  const p = 3; // pixel size
  // Lobster colors
  const R = '#e84832'; // red
  const D = '#b83020'; // dark red
  const O = '#e88832'; // orange
  const E = '#222';    // eyes
  const W = '#fff';    // white

  // Simple lobster pixel art (16x16 grid scaled 3x)
  const sprite = [
    '..RRRR..........',
    '.RRRRRR.........',
    '.RRDDRR.........',
    '..RRRR..........',
    '..RRRR..........',
    '.RRRRRR.........',
    '.REWWER.........',
    '.RRRRRR.........',
    'RRRRRRRR........',
    '.RROORRR........',
    '.RRRRRR.........',
    '..RRRR..........',
    '.RR..RR.........',
    'RR....RR........',
  ];
  const yOff = frame % 2 === 0 ? 0 : 1;
  const colors = { R, D, O, E, W, '.': null };
  sprite.forEach((row, y) => {
    [...row].forEach((ch, x) => {
      const c = colors[ch];
      if (c) {
        ctx.fillStyle = c;
        ctx.fillRect(x * p, (y + yOff) * p, p, p);
      }
    });
  });
}

let lobsterFrame = 0;
function animateLobster() {
  const canvas = document.getElementById('lobster-sprite');
  if (canvas) drawLobsterSprite(canvas, lobsterFrame++);
  setTimeout(animateLobster, 600);
}

let mapCanvas, mapCtx, mapW, mapH;

function lngLatToPixel(lng, lat) {
  // Mercator-like projection
  const x = ((lng + 180) / 360) * mapW;
  const latRad = lat * Math.PI / 180;
  const mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
  const y = (mapH / 2) - (mercN * mapH / (2 * Math.PI));
  return [x, Math.max(0, Math.min(mapH, y))];
}

function drawPixelMap() {
  mapCtx.clearRect(0, 0, mapW, mapH);

  // Ocean background
  mapCtx.fillStyle = '#162040';
  mapCtx.fillRect(0, 0, mapW, mapH);

  // Ocean grid lines (subtle)
  mapCtx.strokeStyle = 'rgba(40,60,100,0.3)';
  mapCtx.lineWidth = 1;
  for (let lng = -180; lng <= 180; lng += 30) {
    const [x] = lngLatToPixel(lng, 0);
    mapCtx.beginPath();
    mapCtx.moveTo(x, 0);
    mapCtx.lineTo(x, mapH);
    mapCtx.stroke();
  }
  for (let lat = -60; lat <= 80; lat += 30) {
    const [, y] = lngLatToPixel(0, lat);
    mapCtx.beginPath();
    mapCtx.moveTo(0, y);
    mapCtx.lineTo(mapW, y);
    mapCtx.stroke();
  }

  // Draw continents as filled pixel polygons
  const continentColor = '#2a4a2a';
  const continentBorder = '#3a6a3a';
  Object.values(CONTINENTS).forEach(points => {
    mapCtx.fillStyle = continentColor;
    mapCtx.strokeStyle = continentBorder;
    mapCtx.lineWidth = 2;
    mapCtx.beginPath();
    points.forEach(([lng, lat], i) => {
      const [x, y] = lngLatToPixel(lng, lat);
      if (i === 0) mapCtx.moveTo(x, y);
      else mapCtx.lineTo(x, y);
    });
    mapCtx.closePath();
    mapCtx.fill();
    mapCtx.stroke();
  });

  // Draw landmark dots
  const ps = Math.max(4, Math.floor(mapW / 180)); // pixel size for dots
  LANDMARKS.forEach(lm => {
    const [x, y] = lngLatToPixel(lm.lng, lm.lat);
    // Glow
    mapCtx.fillStyle = 'rgba(232,168,50,0.3)';
    mapCtx.fillRect(x - ps, y - ps, ps * 3, ps * 3);
    // Dot
    mapCtx.fillStyle = '#e8a832';
    mapCtx.fillRect(x, y, ps, ps);
  });

  // Draw all players on map
  if (characters.length > 0) {
    characters.forEach(ch => {
      if (!ch.currentLocation) return;
      const [x, y] = lngLatToPixel(ch.currentLocation.coordinates.lng, ch.currentLocation.coordinates.lat);
      const isSelected = ch.id === currentCharId;
      // Player dot
      mapCtx.fillStyle = isSelected ? '#88ccee' : '#e55';
      const s = isSelected ? ps + 2 : ps;
      mapCtx.fillRect(x - 1, y - 1, s, s);
      // Name label
      if (isSelected) {
        mapCtx.fillStyle = 'rgba(26,26,46,0.8)';
        mapCtx.fillRect(x + s + 2, y - 6, ch.name.length * 7 + 8, 14);
        mapCtx.fillStyle = '#88ccee';
        mapCtx.font = '10px monospace';
        mapCtx.fillText(ch.name, x + s + 6, y + 4);
        // Animate a pulsing ring
        const time = Date.now() / 500;
        const radius = 8 + Math.sin(time) * 3;
        mapCtx.strokeStyle = 'rgba(136,204,238,0.5)';
        mapCtx.lineWidth = 1;
        mapCtx.beginPath();
        mapCtx.arc(x + s / 2, y + s / 2, radius, 0, Math.PI * 2);
        mapCtx.stroke();
      }
    });
  }

  // Draw travel line if traveling
  if (gameState && gameState.travelPlan && gameState.travelPlan.route) {
    const route = gameState.travelPlan.route;
    mapCtx.strokeStyle = '#e8a832';
    mapCtx.lineWidth = 2;
    mapCtx.setLineDash([6, 3]);
    mapCtx.beginPath();
    route.forEach((pt, i) => {
      const [x, y] = lngLatToPixel(pt.lng, pt.lat);
      if (i === 0) mapCtx.moveTo(x, y);
      else mapCtx.lineTo(x, y);
    });
    mapCtx.stroke();
    mapCtx.setLineDash([]);
  }

  // Highlight hovered landmark
  if (hoveredLandmark) {
    const [x, y] = lngLatToPixel(hoveredLandmark.lng, hoveredLandmark.lat);
    mapCtx.strokeStyle = '#e8a832';
    mapCtx.lineWidth = 2;
    mapCtx.strokeRect(x - ps - 2, y - ps - 2, ps * 3 + 4, ps * 3 + 4);
  }
}

function initMap() {
  mapCanvas = document.getElementById('world-map');
  mapCtx = mapCanvas.getContext('2d');
  function resize() {
    const rect = mapCanvas.parentElement.getBoundingClientRect();
    mapW = Math.floor(rect.width);
    mapH = Math.floor(rect.height);
    mapCanvas.width = mapW;
    mapCanvas.height = mapH;
    drawPixelMap();
  }
  resize();
  window.addEventListener('resize', resize);

  // Tooltip on hover
  const tooltip = document.getElementById('map-tooltip');
  mapCanvas.addEventListener('mousemove', (e) => {
    const rect = mapCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    hoveredLandmark = null;
    const ps = Math.max(4, Math.floor(mapW / 180));
    for (const lm of LANDMARKS) {
      const [x, y] = lngLatToPixel(lm.lng, lm.lat);
      if (Math.abs(mx - x) < ps * 2 && Math.abs(my - y) < ps * 2) {
        hoveredLandmark = lm;
        break;
      }
    }
    // Check player positions too
    if (!hoveredLandmark) {
      for (const ch of characters) {
        if (!ch.currentLocation) continue;
        const [x, y] = lngLatToPixel(ch.currentLocation.coordinates.lng, ch.currentLocation.coordinates.lat);
        if (Math.abs(mx - x) < ps * 2 && Math.abs(my - y) < ps * 2) {
          hoveredLandmark = {
            name: `🦞 ${ch.name}`,
            city: ch.currentLocation.city || '',
            country: ch.currentLocation.country || '',
            lat: ch.currentLocation.coordinates.lat,
            lng: ch.currentLocation.coordinates.lng,
          };
          break;
        }
      }
    }
    if (hoveredLandmark) {
      tooltip.style.display = 'block';
      tooltip.style.left = (mx + 12) + 'px';
      tooltip.style.top = (my - 8) + 'px';
      tooltip.textContent = `${hoveredLandmark.name} • ${hoveredLandmark.city}, ${hoveredLandmark.country}`;
    } else {
      tooltip.style.display = 'none';
    }
    drawPixelMap();
  });
  mapCanvas.addEventListener('mouseleave', () => {
    hoveredLandmark = null;
    tooltip.style.display = 'none';
    drawPixelMap();
  });
}

async function apiFetch(path) {
  try {
    const res = await fetch(`${API_BASE}${path}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    return json.success ? json.data : null;
  } catch (e) {
    console.warn('API error:', path, e.message);
    return null;
  }
}

async function loadCharacters() {
  const data = await apiFetch('/api/characters');
  if (data) {
    characters = data;
    updatePlayerSelect();
    updateLeaderboard();
    return true;
  }
  return false;
}

async function loadGameState(charId) {
  const data = await apiFetch(`/api/characters/${charId}`);
  if (data) {
    gameState = data;
    updateAllPanels();
    return true;
  }
  return false;
}

function updateActivityFeed() {
  const el = document.getElementById('activity-feed');
  const items = [];

  // Collect recent events from gameState
  if (gameState) {
    // Random events
    (gameState.randomEvents || []).forEach(ev => {
      items.push({ time: ev.timestamp, type: 'event', text: `⚡ ${ev.title}: ${ev.description}` });
    });
    // NPC encounters
    (gameState.npcEncounters || []).forEach(enc => {
      items.push({ time: enc.timestamp, type: 'npc', text: `🧑 遇到 ${enc.npc?.name}: "${enc.dialogue}"` });
    });
    // Travel history
    (gameState.travelHistory || []).forEach(h => {
      items.push({ time: h.arrivedAt, type: 'travel', text: `🗺️ 到达 ${h.location?.name || '未知'}` });
    });
    // Photos
    (gameState.photos || []).slice(0, 5).forEach(p => {
      items.push({ time: p.takenAt, type: 'photo', text: `📸 在 ${p.location?.name || '未知'} 拍照` });
    });
    // Poems
    (gameState.poems || []).slice(0, 5).forEach(p => {
      items.push({ time: p.writtenAt, type: 'quest', text: `📝 写诗: ${p.title}` });
    });
    // Quests completed
    (gameState.quests || []).filter(q => q.status === 'completed').forEach(q => {
      items.push({ time: q.completedAt, type: 'quest', text: `✅ 完成任务: ${q.title}` });
    });
  }

  // Sort by time, newest first
  items.sort((a, b) => (b.time || '').localeCompare(a.time || ''));
  const recent = items.slice(0, 20);

  if (recent.length === 0) {
    el.innerHTML = '<div class="no-data">等待冒险开始...</div>';
    return;
  }

  el.innerHTML = recent.map(item => `
    <div class="feed-item ${item.type}">
      <span class="feed-text">${escHtml(item.text)}</span>
      <span class="feed-time">${formatTime(item.time)}</span>
    </div>`).join('');
}

let particleInterval;
function startWeatherParticles(type) {
  if (particleInterval) clearInterval(particleInterval);
  // Remove old particles
  document.querySelectorAll('.particle').forEach(p => p.remove());

  const particleMap = {
    rainy: { char: '💧', count: 15, speed: 2 },
    stormy: { char: '⚡', count: 10, speed: 1.5 },
    snowy: { char: '❄️', count: 20, speed: 5 },
    windy: { char: '🍃', count: 8, speed: 3 },
  };
  const conf = particleMap[type];
  if (!conf) return;

  particleInterval = setInterval(() => {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = conf.char;
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (0.6 + Math.random() * 0.8) + 'rem';
    p.style.animationDuration = (conf.speed + Math.random() * 2) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), (conf.speed + 3) * 1000);
  }, 300);
}

async function poll() {
  const online = await loadCharacters();
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (online) {
    dot.className = 'status-dot online';
    text.textContent = `${characters.length} 位冒险者`;
  } else {
    dot.className = 'status-dot offline';
    text.textContent = '离线';
  }

  if (currentCharId) {
    await loadGameState(currentCharId);
    // Weather particles
    if (gameState?.weather?.type) {
      startWeatherParticles(gameState.weather.type);
    }
  }
}

async function boot() {
  const fill = document.getElementById('boot-fill');
  const steps = [
    () => { fill.style.width = '20%'; initStars(); },
    () => { fill.style.width = '40%'; initMap(); },
    () => { fill.style.width = '60%'; initTabs(); },
    () => { fill.style.width = '80%'; animateLobster(); updateDayNight(); setInterval(updateDayNight, 60000); },
    async () => { fill.style.width = '100%'; await poll(); },
  ];

  for (const step of steps) {
    await step();
    await sleep(300);
  }

  // Player select
  document.getElementById('player-select').addEventListener('change', (e) => {
    currentCharId = e.target.value;
    if (currentCharId) {
      loadGameState(currentCharId);
      playPixelSound('select');
    }
  });

  // Hide boot screen
  await sleep(400);
  document.getElementById('boot-screen').classList.add('hide');
  document.getElementById('app').classList.add('show');
  playPixelSound('success');

  // Start polling every 10s
  pollTimer = setInterval(poll, 10000);

  // Map animation loop
  function mapLoop() {
    drawPixelMap();
    requestAnimationFrame(mapLoop);
  }
  mapLoop();
}

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════

function escHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
    return `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
  } catch { return ''; }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Start ───
window.addEventListener('DOMContentLoaded', boot);
// Enable sound on first user interaction
document.addEventListener('click', () => { ensureAudio(); }, { once: true });
</script>
